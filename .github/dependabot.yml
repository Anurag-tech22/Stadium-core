version: 2
updates:
  # Python runtime + dev dependencies
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Asia/Kolkata"
    groups:
      # Group minor/patch updates to reduce PR noise
      python-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
      - python
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    groups:
      actions-updates:
        patterns:
          - "*"
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
